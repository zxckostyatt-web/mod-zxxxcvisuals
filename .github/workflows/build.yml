plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
    id 'maven-publish'
}

version = '1.0.0'
group = 'net.zxxxc.visuals'

base {
    archivesName = 'zxxxcvisuals'
}

repositories {
    // 1. Официальный репозиторий Fabric
    maven { url = "https://maven.fabricmc.net/" }
    
    // 2. Репозиторий Mojang для скачивания самого Майнкрафта и его библиотек (Netty, LWJGL и др.)
    maven { url = "https://libraries.minecraft.net/" }
    
    // 3. Главный глобальный склад Java-библиотек (решит проблему с компиляцией)
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.4"
    mappings "net.fabricmc:yarn:1.21.4+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.10"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.113.0+1.21.4"
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}"}
    }
}
